<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DroidProxy — Request Flow Visualizer</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-orange: #d29922;
    --accent-purple: #bc8cff;
    --accent-red: #f85149;
    --accent-cyan: #39d2c0;
    --inject-green: rgba(63,185,80,0.12);
    --inject-orange: rgba(210,153,34,0.12);
    --inject-purple: rgba(188,140,255,0.12);
    --inject-red: rgba(248,81,73,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls label {
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--accent-blue); }

  .toggle-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }

  .toggle input { display: none; }

  .toggle .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 10px;
    transition: background 0.2s;
  }

  .toggle .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    bottom: 2px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle input:checked + .slider { background: var(--accent-green); }
  .toggle input:checked + .slider::before { transform: translateX(16px); }

  .toggle-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Flow layout */
  .flow {
    display: flex;
    gap: 0;
    align-items: stretch;
    overflow-x: auto;
    padding-bottom: 16px;
  }

  .arrow-col {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 8px;
    min-width: 50px;
  }

  .arrow-col svg {
    width: 40px;
    height: 24px;
    flex-shrink: 0;
  }

  .arrow-label {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-top: 4px;
  }

  .stage {
    flex: 1;
    min-width: 280px;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .stage-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stage-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .stage-icon.client { background: rgba(88,166,255,0.15); }
  .stage-icon.proxy { background: rgba(63,185,80,0.15); }
  .stage-icon.cliproxy { background: rgba(210,153,34,0.15); }
  .stage-icon.upstream { background: rgba(188,140,255,0.15); }

  .stage-title {
    font-size: 14px;
    font-weight: 600;
  }

  .stage-port {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .stage-body {
    padding: 14px 16px;
    flex: 1;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.7;
  }

  .json-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    white-space: pre;
    font-size: 11.5px;
    line-height: 1.6;
  }

  .json-key { color: var(--accent-blue); }
  .json-str { color: var(--accent-green); }
  .json-num { color: var(--accent-orange); }
  .json-bool { color: var(--accent-red); }

  .injected-line {
    border-radius: 3px;
    padding: 0 4px;
    margin: 0 -4px;
    display: inline-block;
    width: calc(100% + 8px);
  }

  .injected-thinking { background: var(--inject-green); border-left: 2px solid var(--accent-green); }
  .injected-reasoning { background: var(--inject-orange); border-left: 2px solid var(--accent-orange); }
  .injected-service { background: var(--inject-purple); border-left: 2px solid var(--accent-purple); }
  .injected-auth { background: var(--inject-red); border-left: 2px solid var(--accent-red); }
  .injected-config { background: rgba(57,210,192,0.12); border-left: 2px solid var(--accent-cyan); }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin: 12px 0 4px;
  }

  .section-label:first-child { margin-top: 0; }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    margin: 2px 2px 2px 0;
  }

  .badge-green { background: rgba(63,185,80,0.2); color: var(--accent-green); }
  .badge-orange { background: rgba(210,153,34,0.2); color: var(--accent-orange); }
  .badge-purple { background: rgba(188,140,255,0.2); color: var(--accent-purple); }
  .badge-red { background: rgba(248,81,73,0.2); color: var(--accent-red); }
  .badge-cyan { background: rgba(57,210,192,0.2); color: var(--accent-cyan); }
  .badge-blue { background: rgba(88,166,255,0.2); color: var(--accent-blue); }

  .note {
    color: var(--text-muted);
    font-size: 11px;
    font-style: italic;
    margin-top: 8px;
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  .path-rewrite {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin: 8px 0;
    font-size: 11px;
  }

  .path-rewrite .from { color: var(--text-muted); text-decoration: line-through; }
  .path-rewrite .to { color: var(--accent-green); }
  .path-rewrite .arrow-text { color: var(--text-muted); margin: 0 6px; }

  .header-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin: 8px 0;
    font-size: 11px;
    line-height: 1.6;
  }

  .header-name { color: var(--accent-cyan); }
  .header-value { color: var(--text-muted); }
</style>
</head>
<body>

<h1>DroidProxy Request Flow</h1>
<p class="subtitle">End-to-end visualization: what gets injected at each layer</p>

<div class="controls">
  <div>
    <label>Model</label><br>
    <select id="modelSelect">
      <option value="claude-opus-4-7">claude-opus-4-7</option>
      <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
      <option value="gpt-5.3-codex">gpt-5.3-codex</option>
      <option value="gpt-5.4">gpt-5.4</option>
      <option value="gpt-5.5">gpt-5.5</option>
      <option value="claude-haiku-4-5">claude-haiku-4-5 (no injection)</option>
    </select>
  </div>
  <div>
    <label>Request Path</label><br>
    <select id="pathSelect">
      <option value="/v1/messages">/v1/messages (Anthropic)</option>
      <option value="/v1/responses">/v1/responses (OpenAI)</option>
      <option value="/provider/anthropic/v1/messages">/provider/anthropic/v1/messages (Amp)</option>
      <option value="/auth/cli-login">/auth/cli-login (Amp Login)</option>
    </select>
  </div>
  <div class="toggle-group">
    <label class="toggle">
      <input type="checkbox" id="fastModeToggle">
      <span class="slider"></span>
    </label>
    <span class="toggle-label">GPT 5.4/5.5 Fast Mode</span>
  </div>
</div>

<div class="flow" id="flowContainer"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-green)"></div> Thinking injection</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-orange)"></div> Reasoning injection</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-purple)"></div> Service tier injection</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-red)"></div> Auth / OAuth token</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-cyan)"></div> Config / routing</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-blue)"></div> Path rewrite</div>
</div>

<script>
const modelSelect = document.getElementById('modelSelect');
const pathSelect = document.getElementById('pathSelect');
const fastModeToggle = document.getElementById('fastModeToggle');
const flowContainer = document.getElementById('flowContainer');

const MODEL_CONFIG = {
  'claude-opus-4-7': {
    type: 'claude',
    thinkingEffort: 'xhigh',
    injectThinking: true,
    provider: 'anthropic',
  },
  'claude-sonnet-4-6': {
    type: 'claude',
    thinkingEffort: 'high',
    injectThinking: true,
    provider: 'anthropic',
  },
  'gpt-5.3-codex': {
    type: 'codex',
    reasoningEffort: 'high',
    injectReasoning: true,
    provider: 'openai',
  },
  'gpt-5.4': {
    type: 'codex',
    reasoningEffort: 'high',
    injectReasoning: true,
    provider: 'openai',
  },
  'gpt-5.5': {
    type: 'codex',
    reasoningEffort: 'high',
    injectReasoning: true,
    provider: 'openai',
  },
  'claude-haiku-4-5': {
    type: 'claude',
    injectThinking: false,
    provider: 'anthropic',
  },
};

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function jsonLine(key, value, comma, injectClass) {
  const cls = injectClass ? ` class="injected-line ${injectClass}"` : '';
  let valHtml;
  if (typeof value === 'string') {
    valHtml = `<span class="json-str">"${escapeHtml(value)}"</span>`;
  } else if (typeof value === 'number') {
    valHtml = `<span class="json-num">${value}</span>`;
  } else if (typeof value === 'boolean') {
    valHtml = `<span class="json-bool">${value}</span>`;
  } else if (typeof value === 'object') {
    valHtml = `<span class="json-str">${escapeHtml(JSON.stringify(value))}</span>`;
  } else {
    valHtml = escapeHtml(String(value));
  }
  const trail = comma ? ',' : '';
  return `<span${cls}>  <span class="json-key">"${escapeHtml(key)}"</span>: ${valHtml}${trail}</span>`;
}

function jsonObjLine(key, obj, comma, injectClass) {
  const cls = injectClass ? ` class="injected-line ${injectClass}"` : '';
  const trail = comma ? ',' : '';
  const inner = Object.entries(obj).map(([k, v]) =>
    `<span class="json-key">"${escapeHtml(k)}"</span>: <span class="json-str">"${escapeHtml(String(v))}"</span>`
  ).join(', ');
  return `<span${cls}>  <span class="json-key">"${escapeHtml(key)}"</span>: { ${inner} }${trail}</span>`;
}

function arrowSvg() {
  return `<svg viewBox="0 0 40 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 12H32" stroke="#30363d" stroke-width="2"/>
    <path d="M28 6L34 12L28 18" stroke="#30363d" stroke-width="2" fill="none"/>
  </svg>`;
}

function render() {
  const model = modelSelect.value;
  const path = pathSelect.value;
  const fastMode = fastModeToggle.checked;
  const config = MODEL_CONFIG[model];

  const isAmpLogin = path === '/auth/cli-login';
  const isAmpProvider = path.startsWith('/provider/');
  const isResponsesPath = path === '/v1/responses';

  // ─── Stage 1: Client ───
  let clientBodyLines = [];
  clientBodyLines.push('{');
  clientBodyLines.push(jsonLine('model', model, true));
  if (config.type === 'claude') {
    clientBodyLines.push(jsonLine('max_tokens', 4096, true));
    clientBodyLines.push(jsonLine('messages', [{ role: 'user', content: 'Hello' }], false));
  } else {
    clientBodyLines.push(jsonLine('input', 'Hello', false));
  }
  clientBodyLines.push('}');

  let clientHeaders = [];
  clientHeaders.push(`<span class="header-name">POST</span> <span class="header-value">${escapeHtml(path)} HTTP/1.1</span>`);
  clientHeaders.push(`<span class="header-name">Host:</span> <span class="header-value">localhost:8317</span>`);
  clientHeaders.push(`<span class="header-name">Content-Type:</span> <span class="header-value">application/json</span>`);

  // ─── Stage 2: ThinkingProxy ───
  let proxyNotes = [];
  let proxyBodyLines = [];
  let pathRewrite = null;

  if (isAmpLogin) {
    proxyNotes.push('<span class="badge badge-blue">REDIRECT</span> 302 to <code>https://ampcode.com/auth/cli-login</code>');
    proxyNotes.push('<p class="note">Request never reaches CLIProxyAPIPlus — ThinkingProxy handles the redirect directly.</p>');
  } else if (isAmpProvider) {
    pathRewrite = { from: path, to: '/api' + path };
    proxyNotes.push('<span class="badge badge-blue">PATH REWRITE</span> Adds <code>/api</code> prefix for Amp provider routing');
  }

  if (!isAmpLogin) {
    proxyBodyLines.push('{');
    proxyBodyLines.push(jsonLine('model', model, true));

    if (config.injectThinking) {
      proxyBodyLines.push(jsonObjLine('thinking', { type: 'adaptive' }, true, 'injected-thinking'));
      proxyBodyLines.push(jsonObjLine('output_config', { effort: config.thinkingEffort }, true, 'injected-thinking'));
      proxyNotes.push(`<span class="badge badge-green">INJECTED</span> thinking: adaptive, effort: ${config.thinkingEffort}`);
    } else if (config.injectReasoning) {
      proxyBodyLines.push(jsonObjLine('reasoning', { effort: config.reasoningEffort }, true, 'injected-reasoning'));
      proxyNotes.push(`<span class="badge badge-orange">INJECTED</span> reasoning effort: ${config.reasoningEffort}`);
    }

    if ((model === 'gpt-5.4' || model === 'gpt-5.5') && fastMode && isResponsesPath) {
      proxyBodyLines.push(jsonLine('service_tier', 'priority', true, 'injected-service'));
      proxyNotes.push('<span class="badge badge-purple">INJECTED</span> service_tier: priority (fast mode)');
    }

    if (config.type === 'claude') {
      proxyBodyLines.push(jsonLine('max_tokens', 4096, true));
      proxyBodyLines.push(jsonLine('messages', [{ role: 'user', content: 'Hello' }], false));
    } else {
      proxyBodyLines.push(jsonLine('input', 'Hello', false));
    }
    proxyBodyLines.push('}');

    if (!config.injectThinking && !config.injectReasoning && !((model === 'gpt-5.4' || model === 'gpt-5.5') && fastMode && isResponsesPath)) {
      proxyNotes.push('<span class="badge badge-cyan">PASS-THROUGH</span> No injection — body forwarded unchanged');
    }
  }

  // ─── Stage 3: CLIProxyAPIPlus ───
  let cliproxyNotes = [];
  let cliproxyHeaders = [];

  if (!isAmpLogin) {
    cliproxyNotes.push(`<span class="badge badge-red">AUTH</span> Injects OAuth token from <code>~/.cli-proxy-api/</code>`);
    cliproxyNotes.push(`<span class="badge badge-cyan">ROUTING</span> Routes to ${config.provider === 'anthropic' ? 'Anthropic API' : 'OpenAI API'} upstream`);
    cliproxyNotes.push(`<span class="badge badge-cyan">CONFIG</span> Retry: 3 attempts, Timeout: 10m`);

    if (config.type === 'claude') {
      cliproxyHeaders.push(`<span class="header-name">Authorization:</span> <span class="header-value injected-line injected-auth">Bearer sk-ant-oaut-••••••••</span>`);
      cliproxyHeaders.push(`<span class="header-name">anthropic-version:</span> <span class="header-value">2023-06-01</span>`);
      cliproxyHeaders.push(`<span class="header-name">Content-Type:</span> <span class="header-value">application/json</span>`);
    } else {
      cliproxyHeaders.push(`<span class="header-name">Authorization:</span> <span class="header-value injected-line injected-auth">Bearer sess-••••••••</span>`);
      cliproxyHeaders.push(`<span class="header-name">Content-Type:</span> <span class="header-value">application/json</span>`);
    }

    cliproxyNotes.push('<span class="badge badge-cyan">QUOTA</span> switch-project &amp; switch-preview-model on quota exceeded');
  }

  // ─── Stage 4: Upstream ───
  let upstreamInfo = '';
  if (isAmpLogin) {
    upstreamInfo = `
      <p class="section-label">Destination</p>
      <div class="header-block">
        <span class="header-name">https://ampcode.com/auth/cli-login</span>
      </div>
      <p class="note">Browser-based OAuth flow — no JSON body involved.</p>
    `;
  } else {
    const endpoint = config.provider === 'anthropic'
      ? 'https://api.anthropic.com/v1/messages'
      : 'https://api.openai.com/v1/responses';

    let finalLines = [...proxyBodyLines];

    upstreamInfo = `
      <p class="section-label">Endpoint</p>
      <div class="header-block">
        <span class="header-name">POST</span> <span class="header-value">${escapeHtml(endpoint)}</span>
      </div>
      <p class="section-label">Headers (added by CLIProxyAPIPlus)</p>
      <div class="header-block">${cliproxyHeaders.join('<br>')}</div>
      <p class="section-label">Final Request Body</p>
      <div class="json-block">${finalLines.join('\n')}</div>
    `;
  }

  // ─── Build HTML ───
  let html = '';

  // Client stage
  html += `
    <div class="stage">
      <div class="stage-header">
        <div class="stage-icon client">🖥</div>
        <div>
          <div class="stage-title">Client</div>
        </div>
        <div class="stage-port">AI Tool</div>
      </div>
      <div class="stage-body">
        <p class="section-label">Request</p>
        <div class="header-block">${clientHeaders.join('<br>')}</div>
        <p class="section-label">Body (original)</p>
        <div class="json-block">${clientBodyLines.join('\n')}</div>
        <p class="note">Sent to localhost:8317 — no auth headers, no thinking params.</p>
      </div>
    </div>
  `;

  // Arrow
  html += `<div class="arrow-col">${arrowSvg()}<span class="arrow-label">:8317</span></div>`;

  // ThinkingProxy stage
  html += `
    <div class="stage">
      <div class="stage-header">
        <div class="stage-icon proxy">⚡</div>
        <div>
          <div class="stage-title">ThinkingProxy</div>
        </div>
        <div class="stage-port">:8317</div>
      </div>
      <div class="stage-body">
        <p class="section-label">What happens here</p>
        <div style="margin: 8px 0; line-height: 2;">${proxyNotes.join('<br>')}</div>
        ${pathRewrite ? `
          <p class="section-label">Path Rewrite</p>
          <div class="path-rewrite">
            <span class="from">${escapeHtml(pathRewrite.from)}</span>
            <span class="arrow-text">→</span>
            <span class="to">${escapeHtml(pathRewrite.to)}</span>
          </div>
        ` : ''}
        ${!isAmpLogin ? `
          <p class="section-label">Modified Body</p>
          <div class="json-block">${proxyBodyLines.join('\n')}</div>
        ` : ''}
        <p class="note">Edits raw JSON strings surgically to preserve key ordering (cache-safe).</p>
      </div>
    </div>
  `;

  // Arrow
  if (!isAmpLogin) {
    html += `<div class="arrow-col">${arrowSvg()}<span class="arrow-label">:8318</span></div>`;
  } else {
    html += `<div class="arrow-col">${arrowSvg()}<span class="arrow-label">302</span></div>`;
  }

  // CLIProxyAPIPlus stage
  html += `
    <div class="stage">
      <div class="stage-header">
        <div class="stage-icon cliproxy">🔑</div>
        <div>
          <div class="stage-title">CLIProxyAPIPlus</div>
        </div>
        <div class="stage-port">${isAmpLogin ? 'skipped' : ':8318'}</div>
      </div>
      <div class="stage-body">
        ${isAmpLogin ? `
          <p class="note">This stage is bypassed — ThinkingProxy redirects login requests directly to ampcode.com.</p>
        ` : `
          <p class="section-label">What happens here</p>
          <div style="margin: 8px 0; line-height: 2;">${cliproxyNotes.join('<br>')}</div>
          <p class="section-label">Injected Headers</p>
          <div class="header-block">${cliproxyHeaders.join('<br>')}</div>
          <p class="note">Body is passed through unchanged from ThinkingProxy.</p>
        `}
      </div>
    </div>
  `;

  // Arrow
  html += `<div class="arrow-col">${arrowSvg()}<span class="arrow-label">${isAmpLogin ? 'HTTPS' : config.provider === 'anthropic' ? 'Anthropic' : 'OpenAI'}</span></div>`;

  // Upstream stage
  html += `
    <div class="stage">
      <div class="stage-header">
        <div class="stage-icon upstream">☁</div>
        <div>
          <div class="stage-title">Upstream Provider</div>
        </div>
        <div class="stage-port">${isAmpLogin ? 'ampcode.com' : config.provider === 'anthropic' ? 'api.anthropic.com' : 'api.openai.com'}</div>
      </div>
      <div class="stage-body">
        ${upstreamInfo}
      </div>
    </div>
  `;

  flowContainer.innerHTML = html;
}

modelSelect.addEventListener('change', render);
pathSelect.addEventListener('change', render);
fastModeToggle.addEventListener('change', render);
render();
</script>
</body>
</html>
